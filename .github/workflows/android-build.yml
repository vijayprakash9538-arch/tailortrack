name: Build Android APK

# Builds an installable release APK on every push to main (and on demand).
# Download it from the workflow run's "Artifacts" section, transfer to your
# Android phone, and install (you may need to allow "install from unknown
# sources").
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tailortrack-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
