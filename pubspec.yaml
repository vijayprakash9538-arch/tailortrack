name: tailor_track
description: Premium order management app for women's tailoring shops.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5

  # Navigation
  go_router: ^14.2.0

  # Models / immutability
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  record: ^6.0.0
  audioplayers: ^6.1.0
  path_provider: ^2.1.4
  shimmer: ^3.0.0

  # Backend (Supabase) + offline/media
  supabase_flutter: ^2.8.0
  flutter_image_compress: ^2.3.0
  connectivity_plus: ^6.0.5
  shared_preferences: ^2.3.2
  uuid: ^4.5.1

  # Backup / restore (manual export-import)
  file_saver: ^0.2.14
  file_picker: ^8.1.4
  archive: ^3.6.1

  # Firebase (wired behind interfaces; enable when backend is ready)
  # firebase_core: ^3.3.0
  # firebase_auth: ^5.1.2
  # cloud_firestore: ^5.2.0
  # firebase_storage: ^12.1.1
  # firebase_messaging: ^15.0.3
  # firebase_analytics: ^11.2.0
  # firebase_crashlytics: ^4.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
